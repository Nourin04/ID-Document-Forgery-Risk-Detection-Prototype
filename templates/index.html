<!DOCTYPE html>
<html>

<head>
<title>ID Fraud Detection</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    text-align:center;
}

.container{
    width:520px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 6px 15px rgba(0,0,0,0.15);
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

.result{
    margin-top:20px;
    text-align:left;
}

img{
    margin-top:10px;
    max-width:100%;
    border-radius:8px;
}

.progress-bar{
    width:100%;
    background:#ddd;
    border-radius:5px;
    overflow:hidden;
    margin-top:5px;
}

.progress{
    height:18px;
    width:0%;
    background:red;
}

.verdict{
    font-weight:bold;
    font-size:18px;
}

.green{
    color:green;
}

.orange{
    color:orange;
}

.red{
    color:red;
}

</style>
</head>

<body>

<div class="container">

<h1>ID Fraud Detection</h1>

<input type="file" id="fileInput" onchange="previewImage()">

<br><br>

<button onclick="uploadImage()">Analyze ID</button>

<br>

<img id="preview" style="display:none">

<div class="result" id="result"></div>

</div>

<script>

function previewImage(){

    let file = document.getElementById("fileInput").files[0];
    let preview = document.getElementById("preview");

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
}

async function uploadImage(){

    let file = document.getElementById("fileInput").files[0];
      // Show loading message
    document.getElementById("result").innerHTML = "Analyzing document...";

    let formData = new FormData();
    formData.append("file", file);

    let response = await fetch("/upload-id",{
        method:"POST",
        body:formData
    });

    let data = await response.json();

    let risk = data.fraud_report.risk_score;
    let verdict = data.fraud_report.verdict;

    let colorClass = "green";

    if(verdict.includes("Moderate"))
        colorClass = "orange";

    if(verdict.includes("High"))
        colorClass = "red";

    document.getElementById("result").innerHTML = `

    <h3>Analysis Result</h3>

    <p><b>Blur Detected:</b> ${data.blur_detected}</p>
    <p><b>Resolution:</b> ${data.resolution}</p>
    <p><b>Edge Score:</b> ${data.edge_score}</p>

    <h3>Fraud Risk Score</h3>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <p>${risk}%</p>

    <h3 class="verdict ${colorClass}">Verdict: ${verdict}</h3>

    <h3>Signals</h3>

    <p>${data.fraud_report.signals.join("<br>")}</p>

    `;

    document.getElementById("progress").style.width = risk + "%";

}

</script>

</body>

</html>
